<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0A0A0A" />
    <meta
      name="description"
      content="EncoreHub — discover and book tickets for concerts, sports, movies, comedy shows and festivals near you."
    />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />

    <!-- Open Graph (Facebook, LinkedIn, WhatsApp, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="EncoreHub" />
    <meta property="og:title" content="EncoreHub — Book Tickets for Live Events" />
    <meta property="og:description" content="Discover and book tickets for concerts, sports, movies, comedy shows and festivals near you." />
    <meta property="og:image" content="%PUBLIC_URL%/og-image.jpg" />
    <meta property="og:url" content="%PUBLIC_URL%/" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="EncoreHub — Book Tickets for Live Events" />
    <meta name="twitter:description" content="Discover and book tickets for concerts, sports, movies, comedy shows and festivals near you." />
    <meta name="twitter:image" content="%PUBLIC_URL%/og-image.jpg" />

    <!--
      Per-page titles and OG tags (e.g. for individual event pages) are set at
      runtime via react-helmet-async — see EventDetails.js. Crawlers that
      execute JavaScript (Facebook, LinkedIn, Slack, modern WhatsApp preview
      fetchers) will pick those up; ones that don't will fall back to the
      defaults above. True per-URL server-rendered OG tags would require SSR
      or a prerendering step, which this CRA setup doesn't include.
    -->

    <title>EncoreHub — Book Tickets for Live Events</title>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
